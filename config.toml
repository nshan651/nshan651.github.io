title = 'nshan.is'
baseURL = 'https://nshan651.github.io/'
languageCode = 'en-us'

[params]
  # "relatedtext" is the text that appears above the tag list at the bottom of pages.
  # relatedtext = "Related"
  favicon = "/favicon.ico"

  # list items
  datesinlist = true
  authorsinlist = true

  # footer items
  # nextprev = true
  taglist = true
  showrss = true


[markup]
  [markup.highlight]
    style = 'modus-vivendi'
    tabWidth = 4
    useHLJS = true
    pygmentsCodeFences = true
    pygmentsUseClasses = true
  [markup.goldmark]
    [markup.goldmark.extensions]
      autoHeadingID = true
      toc = true
      [markup.goldmark.renderer]